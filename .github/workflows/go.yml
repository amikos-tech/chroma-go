name: Go Tests

on:
  pull_request:
    branches: [ "main" , "**" ]
  workflow_dispatch:
    inputs:
      run_api:
        description: 'Run API tests'
        required: false
        type: boolean
        default: false
      run_cloud:
        description: 'Run Cloud integration tests'
        required: false
        type: boolean
        default: false
      run_ef:
        description: 'Run Embedding Function tests'
        required: false
        type: boolean
        default: false
      run_rf:
        description: 'Run Ranking Function tests'
        required: false
        type: boolean
        default: false
      run_crosslang:
        description: 'Run Cross-Language tests (EF + local runtime persistence)'
        required: false
        type: boolean
        default: false
      run_smoke:
        description: 'Run cross-platform smoke tests'
        required: false
        type: boolean
        default: false
      run_offline_smoke:
        description: 'Run offline bootstrap smoke test'
        required: false
        type: boolean
        default: false

jobs:
  paths-filter:
    name: Get changed paths
    runs-on: ubuntu-latest
    outputs:
      smoke: ${{ steps.changes.outputs.smoke }}
      embeddings: ${{ steps.changes.outputs.embeddings }}
      rerankings: ${{ steps.changes.outputs.rerankings }}
      crosslang: ${{ steps.changes.outputs.crosslang }}
      docs: ${{ steps.changes.outputs.docs }}
      base: ${{ steps.changes.outputs.base }}
    steps:
      - name: Get changed paths
        id: changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          filters: |
            smoke:
              - 'pkg/api/v2/**'
              - 'pkg/commons/**'
              - 'pkg/embeddings/**'
              - 'pkg/internal/**'
              - 'pkg/logger/**'
              - 'pkg/rerankings/**'
              - 'pkg/tokenizers/**'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - '.github/workflows/go.yml'
            base:
              - 'pkg/api/v2/**'
              - 'pkg/commons/**'
              - 'pkg/logger/**'
              - 'internal/**'
              - 'go.mod'
              - 'go.sum'
            embeddings:
              - 'pkg/embeddings/**'
              - 'pkg/commons/embed/**'
            rerankings:
              - 'pkg/rerankings/**'
              - 'pkg/commons/cohere/**'
            crosslang:
              - 'scripts/cross_lang_ef_test.py'
              - 'scripts/local_persistence_crosscheck.py'
              - 'pkg/embeddings/cross_lang_integration_test.go'
              - 'pkg/api/v2/client_local.go'
              - 'pkg/api/v2/client_local_embedded.go'
              - 'pkg/api/v2/client_local_library_download.go'
              - 'pkg/api/v2/client_local_test.go'
              - 'pkg/api/v2/client_local_library_download_test.go'
              - 'pkg/api/v2/client_local_crosslang_integration_test.go'
              - 'requirements-test.txt'
              - 'go.mod'
              - 'go.sum'
            docs:
              - 'docs/**'
  lint:
    name: Lint
    runs-on: ubuntu-latest
    environment: Test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: 'go.mod'
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.1
  windows-compile:
    name: Windows Compile Guard
    runs-on: ubuntu-latest
    needs: [lint, paths-filter]
    if: inputs.run_ef || needs.paths-filter.outputs.embeddings == 'true' || needs.paths-filter.outputs.base == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: 'go.mod'
      - name: Compile API V2 tests for Windows
        run: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go test -c -o /tmp/api-v2.test.exe ./pkg/api/v2
      - name: Compile default_ef tests for Windows
        run: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go test -c -o /tmp/default-ef.test.exe ./pkg/embeddings/default_ef
  smoke-cross-platform:
    name: Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [lint, paths-filter]
    if: (github.event_name == 'workflow_dispatch' && inputs.run_smoke) || needs.paths-filter.outputs.smoke == 'true'
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: 'go.mod'
      - name: Compile all packages
        run: go test -run '^$' ./...
      - name: Run basicv2 smoke test
        run: go test -v -tags=basicv2 -run '^TestPageNumber$' ./pkg/api/v2
      - name: Run default_ef runtime smoke test
        run: go test -v -count=1 -run '^TestDefaultEF_BootstrapSmoke$' ./pkg/embeddings/default_ef
        env:
          RUN_DEFAULT_EF_BOOTSTRAP_SMOKE: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  offline-smoke:
    name: Offline Bootstrap Smoke
    runs-on: ubuntu-latest
    needs: [lint, paths-filter]
    if: github.event_name == 'workflow_dispatch' && inputs.run_offline_smoke
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: 'go.mod'
      - name: Prepare runtime dependencies and run offline bootstrap smoke
        run: make offline-smoke
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  api:
    name: Test Chroma API
    runs-on: ubuntu-latest
    needs: [lint,paths-filter]
    if: inputs.run_api || needs.paths-filter.outputs.base == 'true'
    strategy:
      fail-fast: false
      matrix:
        chroma-version: ["0.6.3","1.1.0","1.5.2"]
    environment: Test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: 'go.mod'
      - name: Build
        run: make build
      - name: Test
        run: make test
        env:
          CHROMA_VERSION: ${{ matrix.chroma-version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Race Test (concurrency state)
        run: make test-race-v2
      - name: Upload Test Results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: test-results-${{ matrix.chroma-version }}
          path: |
            coverage.out
            unit.xml
  cloud:
    name: Test Chroma Cloud (${{ matrix.test }})
    runs-on: ubuntu-22.04
    needs: [ lint,paths-filter ]
    if: inputs.run_cloud || needs.paths-filter.outputs.base == 'true'
    environment: Test
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        test: [CRUD, AutoWire, Search, Schema, Config]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: 'go.mod'
      - name: Build
        run: make build
      - name: Test ${{ matrix.test }}
        run: go test -v -tags=basicv2,cloud -timeout=8m -run "TestCloudClient${{ matrix.test }}" ./pkg/api/v2/...
        timeout-minutes: 10
        env:
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY }}
          CHROMA_TENANT: ${{ secrets.CHROMA_TENANT }}
          CHROMA_DATABASE: ${{ secrets.CHROMA_DATABASE }}
          CI: "true"
      - name: Upload Test Results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: test-results-cloud-${{ matrix.test }}
          path: |
            coverage-cloud.out
            unit-cloud.xml
  cloud-cleanup:
    name: Cleanup Cloud Collections
    runs-on: ubuntu-22.04
    needs: [cloud, paths-filter]
    if: always() && (inputs.run_cloud || needs.paths-filter.outputs.base == 'true')
    environment: Test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: 'go.mod'
      - name: Cleanup test collections
        run: go test -v -tags=basicv2,cloud -timeout=5m -run "TestCloudCleanup" ./pkg/api/v2/...
        env:
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY }}
          CHROMA_TENANT: ${{ secrets.CHROMA_TENANT }}
          CHROMA_DATABASE: ${{ secrets.CHROMA_DATABASE }}
  ef:
    name: Test EF (${{ matrix.provider }})
    runs-on: ubuntu-latest
    needs: [lint, paths-filter]
    if: inputs.run_ef || needs.paths-filter.outputs.embeddings == 'true'
    environment: Test
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          # Keep provider matrix simple; scope secrets in the test step env below.
          - provider: openai
            test_path: ./pkg/embeddings/openai/...
          - provider: cohere
            test_path: ./pkg/embeddings/cohere/...
          - provider: hf
            test_path: ./pkg/embeddings/hf/...
          - provider: cloudflare
            test_path: ./pkg/embeddings/cloudflare/...
          - provider: together
            test_path: ./pkg/embeddings/together/...
          - provider: voyage
            test_path: ./pkg/embeddings/voyage/...
          - provider: gemini
            test_path: ./pkg/embeddings/gemini/...
          - provider: mistral
            test_path: ./pkg/embeddings/mistral/...
          - provider: nomic
            test_path: ./pkg/embeddings/nomic/...
          - provider: jina
            test_path: ./pkg/embeddings/jina/...
          - provider: roboflow
            test_path: ./pkg/embeddings/roboflow/...
          - provider: morph
            test_path: ./pkg/embeddings/morph/...
          - provider: perplexity
            test_path: ./pkg/embeddings/perplexity/...
          - provider: baseten
            test_path: ./pkg/embeddings/baseten/...
          - provider: bedrock
            test_path: ./pkg/embeddings/bedrock/...
          # Local providers (no API keys)
          - provider: default_ef
            test_path: ./pkg/embeddings/default_ef/...
          - provider: bm25
            test_path: ./pkg/embeddings/bm25/...
          # Docker-based (testcontainers)
          - provider: ollama
            test_path: ./pkg/embeddings/ollama/...
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: 'go.mod'
      - name: Build
        run: make build
      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest
      - name: Test ${{ matrix.provider }}
        run: |
          gotestsum \
            --format short-verbose \
            --rerun-fails=1 \
            --packages="${{ matrix.test_path }}" \
            --junitfile unit-ef-${{ matrix.provider }}.xml \
            -- \
            -v \
            -tags=ef \
            -coverprofile=coverage-ef-${{ matrix.provider }}.out \
            -timeout=15m
        env:
          OPENAI_API_KEY: ${{ matrix.provider == 'openai' && secrets.OPENAI_API_KEY || '' }}
          COHERE_API_KEY: ${{ matrix.provider == 'cohere' && secrets.COHERE_API_KEY || '' }}
          HF_API_KEY: ${{ matrix.provider == 'hf' && secrets.HF_API_KEY || '' }}
          CF_API_TOKEN: ${{ matrix.provider == 'cloudflare' && secrets.CF_API_TOKEN || '' }}
          CF_ACCOUNT_ID: ${{ matrix.provider == 'cloudflare' && secrets.CF_ACCOUNT_ID || '' }}
          CF_GATEWAY_ENDPOINT: ${{ matrix.provider == 'cloudflare' && secrets.CF_GATEWAY_ENDPOINT || '' }}
          TOGETHER_API_KEY: ${{ matrix.provider == 'together' && secrets.TOGETHER_API_KEY || '' }}
          VOYAGE_API_KEY: ${{ matrix.provider == 'voyage' && secrets.VOYAGE_API_KEY || '' }}
          GEMINI_API_KEY: ${{ matrix.provider == 'gemini' && secrets.GEMINI_API_KEY || '' }}
          MISTRAL_API_KEY: ${{ matrix.provider == 'mistral' && secrets.MISTRAL_API_KEY || '' }}
          NOMIC_API_KEY: ${{ matrix.provider == 'nomic' && secrets.NOMIC_API_KEY || '' }}
          JINA_API_KEY: ${{ matrix.provider == 'jina' && secrets.JINA_API_KEY || '' }}
          ROBOFLOW_API_KEY: ${{ matrix.provider == 'roboflow' && secrets.ROBOFLOW_API_KEY || '' }}
          MORPH_API_KEY: ${{ matrix.provider == 'morph' && secrets.MORPH_API_KEY || '' }}
          PERPLEXITY_API_KEY: ${{ matrix.provider == 'perplexity' && secrets.PERPLEXITY_API_KEY || '' }}
          BASETEN_API_KEY: ${{ matrix.provider == 'baseten' && secrets.BASETEN_API_KEY || '' }}
          BASETEN_BASE_URL: ${{ matrix.provider == 'baseten' && secrets.BASETEN_BASE_URL || '' }}
          AWS_ACCESS_KEY_ID: ${{ matrix.provider == 'bedrock' && secrets.AWS_ACCESS_KEY_ID || '' }}
          AWS_SECRET_ACCESS_KEY: ${{ matrix.provider == 'bedrock' && secrets.AWS_SECRET_ACCESS_KEY || '' }}
          AWS_REGION: ${{ matrix.provider == 'bedrock' && secrets.AWS_REGION || '' }}
          AWS_BEARER_TOKEN_BEDROCK: ${{ matrix.provider == 'bedrock' && secrets.AWS_BEARER_TOKEN_BEDROCK || '' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Test Results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: ef-test-results-${{ matrix.provider }}
          path: |
            coverage-ef-${{ matrix.provider }}.out
            unit-ef-${{ matrix.provider }}.xml
  rf:
    name: Test RF (${{ matrix.provider }})
    runs-on: ubuntu-latest
    needs: [lint, paths-filter]
    if: inputs.run_rf || needs.paths-filter.outputs.rerankings == 'true'
    environment: Test
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - provider: cohere
            test_path: ./pkg/rerankings/cohere/...
          - provider: hf
            test_path: ./pkg/rerankings/hf/...
          - provider: jina
            test_path: ./pkg/rerankings/jina/...
          - provider: together
            test_path: ./pkg/rerankings/together/...
          - provider: core
            test_path: ./pkg/rerankings
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: 'go.mod'
      - name: Build
        run: make build
      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest
      - name: Test ${{ matrix.provider }}
        run: |
          gotestsum \
            --format short-verbose \
            --rerun-fails=1 \
            --packages="${{ matrix.test_path }}" \
            --junitfile unit-rf-${{ matrix.provider }}.xml \
            -- \
            -v \
            -tags=rf \
            -coverprofile=coverage-rf-${{ matrix.provider }}.out \
            -timeout=15m
        env:
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: rf-test-results-${{ matrix.provider }}
          path: |
            coverage-rf-${{ matrix.provider }}.out
            unit-rf-${{ matrix.provider }}.xml
  crosslang:
    name: Test Cross-Language Compatibility
    runs-on: ubuntu-latest
    needs: [lint,paths-filter]
    if: inputs.run_crosslang || needs.paths-filter.outputs.crosslang == 'true' || needs.paths-filter.outputs.embeddings == 'true'
    environment: Test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: 'go.mod'
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
      - name: Install Python dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements-test.txt
      - name: Build
        run: make build
      - name: Test
        run: make test-crosslang
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CHROMA_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY }}
          CHROMA_TENANT: ${{ secrets.CHROMA_TENANT }}
          CHROMA_DATABASE: ${{ secrets.CHROMA_DATABASE }}
      - name: Test local runtime cross-persistence
        run: make test-crosslang-local
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: crosslang-test-results
          path: |
            coverage-crosslang.out
            unit-crosslang.xml
            coverage-crosslang-local.out
            unit-crosslang-local.xml
